<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#8c6a3a" />
    <meta name="description" content="Property rent and expense management application" />
    <meta name="application-name" content="Popaty" />
    <meta name="apple-mobile-web-app-title" content="Popaty" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="mask-icon" href="%sveltekit.assets%/favicon.svg" color="#8c6a3a" />
    
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>

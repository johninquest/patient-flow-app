services:
  postgres:
    image: postgres:18.4-alpine
    container_name: patient-flow-postgres-test
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=patientflow
      - POSTGRES_PASSWORD=patientflow_dev_password
      - POSTGRES_DB=patientflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - patient-flow-test

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: patient-flow-api-test
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://patientflow:patientflow_dev_password@postgres:5432/patientflow
      - AUTH_SECRET=${AUTH_SECRET}
      - API_URL=http://localhost:3000
      - CLIENT_URL=http://localhost:5173
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      - postgres
    networks:
      - patient-flow-test

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: patient-flow-client-test
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - patient-flow-test

volumes:
  postgres_data:

networks:
  patient-flow-test:
    driver: bridge
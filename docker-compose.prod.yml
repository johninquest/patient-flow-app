services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: patient-flow-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - API_URL=${API_URL}
      - CLIENT_URL=${CLIENT_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    labels:
      - "traefik.enable=true"
      # API routing
      - "traefik.http.routers.patient-flow-api.entrypoints=websecure"
      - "traefik.http.routers.patient-flow-api.rule=Host(`api.patientflow.app`)"
      - "traefik.http.routers.patient-flow-api.tls=true"
      - "traefik.http.routers.patient-flow-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.patient-flow-api.loadbalancer.server.port=3000"
    networks:
      - proxy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    container_name: patient-flow-client
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
    labels:
      - "traefik.enable=true"
      # Client routing
      - "traefik.http.routers.patient-flow-client.entrypoints=websecure"
      - "traefik.http.routers.patient-flow-client.rule=Host(`app.patientflow.app`)"
      - "traefik.http.routers.patient-flow-client.tls=true"
      - "traefik.http.routers.patient-flow-client.tls.certresolver=letsencrypt"
      - "traefik.http.services.patient-flow-client.loadbalancer.server.port=3000"
    depends_on:
      - api
    networks:
      - proxy

networks:
  proxy:
    external: true